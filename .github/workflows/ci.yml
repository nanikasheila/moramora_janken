name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-python:
    name: Lint Python (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: pip install ruff

      - name: Ruff lint
        run: python -m ruff check tools/

      - name: Ruff format check
        run: python -m ruff format --check tools/

  lint-markdown:
    name: Lint Markdown (markdownlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Markdown files
        run: npx --yes markdownlint-cli2

  validate-schemas:
    name: Validate .github schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate JSON schemas
        run: python tools/validate-schemas/validate_schemas.py

  validate-config:
    name: Validate .github config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate settings and config
        run: python tools/validate-github-config/validate_config.py

  test:
    name: Python unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run tests
        run: python tools/validate-github-config/test_validate_config.py

      - name: Run architecture validator tests
        run: python tools/validate-architecture/test_validate_architecture.py

  validate-architecture:
    name: Validate architecture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Validate architecture
        run: python tools/validate-architecture/validate_architecture.py
